      { inline: `<section data-section="act2" id="conversation-accumulation">

      // =========================================================
      // RAG 보너스 섹션 — 에필로그 이후 추가 발표용
      // 슬라이드 추가 시 아래 주석 패턴 유지:
      //   파일 추가: 'slides/04-xx-rag-이름.md'
      //   인라인 추가: { inline: `<section ...>...</section>` }
      // =========================================================

      { inline: `<section class="act-divider" data-section="rag">
        <div class="act-number">BONUS</div>
        <h1>RAG</h1>
        <p class="subtitle">Retrieval-Augmented Generation — LLM에게 참고서를 주는 기술</p>
      </section>` },

      // RAG_SLIDE_01: 섹션 표지 (위 인라인)
      // RAG_SLIDE_02–09: 개념편 (왜 필요한가 · 동작 흐름 · 청크 · 임베딩 · 검색 · 도구)
      'slides/04-01-rag-concepts.md',

      // RAG_SLIDE_10–16: 구현·에이전틱편 (기본 코드 · 한계 · Agentic RAG · ReAct · LangGraph · LangChain)
      'slides/04-02-rag-agentic.md',

      // RAG_SLIDE_17–20: Graph RAG·정리편 (벡터 한계 · 지식 그래프 · Graph RAG · 전체 지도)
      'slides/04-03-rag-graph.md',
    ];

    async function loadSlides() {
      const container = document.getElementById('slidesContainer');
      const parts = [];
      for (const item of SLIDE_FILES) {
        if (item && typeof item === 'object' && item.inline) {
          parts.push(item.inline);
          continue;
        }
        try {
          const res = await fetch(item);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          parts.push(await res.text());
        } catch (err) {
          console.error('Failed to load:', item, err);
          parts.push(`<section><h2>⚠️ Load error</h2><p>${item}</p></section>`);
        }
      }
      container.innerHTML = parts.join('\n');
      document.getElementById('loader').style.display = 'none';

      Reveal.initialize({
        hash: true,
        slideNumber: 'c/t',
        width: 1920,
        height: 1080,
        margin: 0.04,
        minScale: 0.2,
        maxScale: 2.0,
        transition: 'slide',
        backgroundTransition: 'fade',
        plugins: [ RevealHighlight, RevealNotes ]
      });

      if (window.mermaid) {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'dark',
          themeVariables: { fontFamily: 'Pretendard, sans-serif' }
        });
      }

      setTimeout(() => {
        if (window.renderVisualizations) window.renderVisualizations();
      }, 200);

      // mermaid: 현재 보이는 슬라이드의 다이어그램만 렌더한다.
      // (비활성 슬라이드는 display:none 이라 크기 측정이 NaN → 깨진 SVG + data-processed 마킹되어 영구 깨짐)
      function renderMermaidIn(scope) {
        (scope || document).querySelectorAll('.mermaid:not([data-processed])').forEach(el => {
          if (window.mermaid) mermaid.run({ nodes: [el] });
        });
      }
      Reveal.on('ready', (event) => {
        renderMermaidIn(event && event.currentSlide);
      });
      Reveal.on('slidechanged', (event) => {
        renderMermaidIn(event && event.currentSlide);
        if (window.renderVisualizations) window.renderVisualizations();
      });
    }

    loadSlides();
  </script>
